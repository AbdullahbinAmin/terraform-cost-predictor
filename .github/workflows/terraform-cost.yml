name: Terraform Cost Analysis

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'
  # Also allow manual trigger for testing
  workflow_dispatch:

jobs:
  cost-analysis:
    name: Estimate Infrastructure Costs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install typer rich pyyaml requests jinja2

      # If you have Terraform installed and AWS credentials, generate a real plan:
      # - name: Set up Terraform
      #   uses: hashicorp/setup-terraform@v3
      #   with:
      #     terraform_version: 1.6.4
      # - name: Terraform Init & Plan
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #   run: |
      #     terraform init
      #     terraform plan -out=tfplan
      #     terraform show -json tfplan > plan.json

      - name: Run Cost Analysis
        id: cost
        continue-on-error: true
        run: |
          python -m cli.main predict examples/sample_plan.json \
            --budget configs/budget.yaml \
            --output json \
            --output-file cost-report.json
          echo "cost_exit=$?" >> $GITHUB_OUTPUT

      - name: Generate Markdown Report
        id: report
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path

          report_path = Path("cost-report.json")
          if not report_path.exists():
              Path("pr-comment.md").write_text("## Terraform Cost Analysis\n\nCost report not generated. Check workflow logs.")
              sys.exit(0)

          report = json.loads(report_path.read_text())
          total = report["total_monthly_cost"]
          resources = report["resources"]

          lines = [
            "## Terraform Cost Analysis",
            "",
            f"**Estimated Monthly Cost: ${total:,.2f} USD**",
            "",
            "| Action | Resource | Type | Monthly Cost |",
            "|--------|----------|------|-------------|",
          ]
          for r in resources:
            if r["action"] == "no-op":
                continue
            cost = f"${r['monthly_cost']:,.2f}" if r.get("is_supported") else "N/A"
            sym = {"create": "+", "delete": "-", "update": "~", "replace": "!"}.get(r["action"], "·")
            lines.append(f"| {sym} {r['action']} | `{r['address']}` | `{r['resource_type']}` | {cost} |")

          if comp := report.get("comparison"):
            delta = comp["delta"]
            sign = "+" if delta >= 0 else ""
            lines += [
              "",
              "### Cost Change vs Previous Run",
              f"- Previous: **${comp['previous_total']:,.2f}**",
              f"- Current: **${comp['current_total']:,.2f}**",
              f"- Delta: **{sign}${delta:,.2f}** ({comp['delta_percent']:+.1f}%)",
            ]
            if drivers := comp.get("top_drivers"):
              lines += ["", "**Top Cost Drivers:**"]
              for d in drivers:
                sign = "+" if d["delta"] >= 0 else ""
                lines.append(f"- `{d['address']}`: {sign}${d['delta']:,.2f}/mo")

          if budget := report.get("budget"):
            status = "PASSED" if budget["passed"] else "BLOCKED"
            lines += ["", f"**Budget Check: {status}**"]
            if budget.get("message"):
              lines.append(budget["message"])

          lines += ["", "---", "*Generated by [Terraform Cost Predictor](https://github.com/AbdullahbinAmin/terraform-cost-predictor)*"]

          Path("pr-comment.md").write_text("\n".join(lines))
          print("PR comment generated successfully.")
          EOF

      - name: Comment on Pull Request
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr-comment.md

      - name: Upload Cost Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-cost-report
          path: cost-report.json
          retention-days: 30

      - name: Block on Budget Exceeded
        if: steps.cost.outputs.cost_exit != '0' && steps.cost.outcome == 'failure'
        run: |
          echo "::error::Estimated cost exceeds budget. See cost-report.json for details."
          exit 1
