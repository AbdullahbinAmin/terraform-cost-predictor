name: Terraform Cost Analysis

on:
  pull_request:
    paths:
      - '**.tf'
      - '**.tfvars'

jobs:
  cost-analysis:
    name: Estimate Infrastructure Costs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Terraform Cost Predictor
        run: pip install terraform-cost-predictor

      # If you have Terraform installed and AWS credentials, generate a real plan:
      # - name: Set up Terraform
      #   uses: hashicorp/setup-terraform@v3
      #   with:
      #     terraform_version: 1.6.4
      # - name: Terraform Init & Plan
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #   run: |
      #     terraform init
      #     terraform plan -out=tfplan
      #     terraform show -json tfplan > plan.json

      # For demo / CI without live AWS: use a sample plan
      - name: Run Cost Analysis
        id: cost
        run: |
          cost-predict predict examples/sample_plan.json \
            --budget configs/budget.yaml \
            --output json \
            --output-file cost-report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Generate Markdown Report
        id: report
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path

          report = json.loads(Path("cost-report.json").read_text())
          total = report["total_monthly_cost"]
          resources = report["resources"]

          lines = [
            "## 🔮 Terraform Cost Analysis",
            "",
            f"**Estimated Monthly Cost: ${total:,.2f} USD**",
            "",
            "| Action | Resource | Type | Monthly Cost |",
            "|--------|----------|------|-------------|",
          ]
          for r in resources:
            if r["action"] == "no-op":
                continue
            cost = f"${r['monthly_cost']:,.2f}" if r.get("is_supported") else "—"
            sym = {"create": "✚", "delete": "✖", "update": "~", "replace": "↺"}.get(r["action"], "·")
            lines.append(f"| {sym} {r['action']} | `{r['address']}` | `{r['resource_type']}` | {cost} |")

          if comp := report.get("comparison"):
            delta = comp["delta"]
            sign = "+" if delta >= 0 else ""
            lines += [
              "",
              "### 📈 Cost Change vs Previous Run",
              f"- Previous: **${comp['previous_total']:,.2f}**",
              f"- Current: **${comp['current_total']:,.2f}**",
              f"- Delta: **{sign}${delta:,.2f}** ({comp['delta_percent']:+.1f}%)",
            ]
            if drivers := comp.get("top_drivers"):
              lines += ["", "**Top Cost Drivers:**"]
              for d in drivers:
                sign = "+" if d["delta"] >= 0 else ""
                lines.append(f"- `{d['address']}`: {sign}${d['delta']:,.2f}/mo")

          if budget := report.get("budget"):
            status = "✅ PASSED" if budget["passed"] else "❌ BLOCKED"
            lines += ["", f"**Budget Check: {status}**", budget.get("message","")]

          lines += ["", "---", "*Generated by [Terraform Cost Predictor](https://github.com/your-org/terraform-cost-predictor)*"]

          Path("pr-comment.md").write_text("\n".join(lines))
          print("PR comment generated.")
          EOF

      - name: Comment on Pull Request
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr-comment.md

      - name: Upload Cost Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-cost-report
          path: cost-report.json
          retention-days: 30

      - name: Block on Budget Exceeded
        if: steps.cost.outputs.exit_code != '0'
        run: |
          echo "::error::💰 Estimated cost exceeds budget. See cost-report.json for details."
          exit 1
