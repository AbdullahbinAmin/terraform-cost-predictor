name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip and install build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install runtime dependencies
        run: |
          pip install typer rich pyyaml requests jinja2

      - name: Install dev dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        continue-on-error: true
        with:
          file: ./coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff Lint
        run: ruff check . --select=E,F,W --ignore=E501

      - name: Ruff Format Check
        run: ruff format --check .

  smoke-test:
    name: Smoke Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Upgrade pip and install build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package dependencies
        run: pip install typer rich pyyaml requests jinja2

      - name: Run against sample plan (basic)
        run: python -m cli.main predict examples/sample_plan.json

      - name: Run with budget enforcement
        run: python -m cli.main predict examples/sample_plan.json --budget configs/budget.yaml

      - name: Test JSON output
        run: python -m cli.main predict examples/sample_plan.json --output json

      - name: Test version command
        run: python -m cli.main version

      - name: Test history list command
        run: python -m cli.main history list
